<!DOCTYPE html>
<html>
<head>
    <title>{{ page.title }}</title>
    <style>
        body {
            background-color: #050a05;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            margin: 0; padding: 20px;
            overflow: hidden;
            text-shadow: 0 0 5px #00ff41;
        }
        body::before {
            content: " "; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.06));
            z-index: 10; background-size: 100% 3px, 3px 100%; pointer-events: none;
        }
        #output { height: 85vh; overflow-y: auto; white-space: pre-wrap; margin-bottom: 10px; animation: flicker 0.15s infinite; }
        .prompt-line { display: flex; align-items: center; }
        .prompt { margin-right: 10px; font-weight: bold; }
        input { background: transparent; border: none; color: #00ff41; font-family: inherit; font-size: inherit; outline: none; flex: 1; }
        @keyframes flicker { 0% { opacity: 0.98; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="output">{{ page.boot_message }}
{{ content }}</div>

    <div class="prompt-line">
        <span class="prompt">SAPHAH_ADMIN ></span>
        <input type="text" id="command-input" autofocus>
    </div>

    <script>
        const input = document.getElementById('command-input');
        const output = document.getElementById('output');
        const subs = {{ site.data.subscribers | jsonify }};

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const cmd = input.value.trim().toLowerCase();
                handleCommand(cmd);
                input.value = '';
            }
        });

        function handleCommand(cmd) {
            printLine(`\n> ${cmd}`);

            if (cmd === 'help') {
                printLine("COMMANDS: \n- LS: List subscribers\n- STATS: Show confirmation metrics\n- CLEAR: Wipe screen");
            } else if (cmd === 'ls') {
                printLine("NAME | EMAIL | SEQ | CONFIRMED");
                printLine("--------------------------------------");
                subs.forEach(s => {
                    const status = s.confirmed ? "[YES]" : "[NO]";
                    printLine(`${s.name.padEnd(15)} | ${s.email} | ${s.sequence_index} | ${status}`);
                });
            } else if (cmd === 'stats') {
                const confirmedCount = subs.filter(s => s.confirmed).length;
                const unsubbed = subs.filter(s => s.unsubscribed).length;
                printLine(`TOTAL: ${subs.length}\nCONFIRMED: ${confirmedCount}\nUNSUBSCRIBED: ${unsubbed}`);
            } else if (cmd === 'clear') {
                output.innerHTML = 'CONSOLE REBOOTED.';
            } else {
                printLine("ERROR: UNKNOWN COMMAND.");
            }
            output.scrollTop = output.scrollHeight;
        }

        function printLine(text) {
            output.innerHTML += `\n${text}`;
        }
    </script>
</body>
</html>
